# Docker Compose para Producción - Booking Titanium AI Agent v2.3

version: '3.8'

services:
  # ============================================================================
  # REDIS - Cache y Monitoreo
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: booking-redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # AI AGENT PRODUCTION - Windmill Script
  # ============================================================================
  ai-agent:
    build:
      context: .
      dockerfile: Dockerfile.ai-agent
    container_name: booking-ai-agent
    environment:
      # Redis
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # LLM Providers (fallback order)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      
      # Monitoring
      - ENABLE_ALERTS=true
      - ALERT_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      
      # Configuration
      - CACHE_TTL=3600
      - SIMILARITY_THRESHOLD=0.95
      - MAX_CACHE_SIZE=10000
      
      # Timeouts
      - REQUEST_TIMEOUT=30s
      - CACHE_TIMEOUT=5s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # MONITORING - Prometheus (opcional)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: booking-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    profiles:
      - monitoring

  # ============================================================================
  # GRAFANA - Dashboards (opcional)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: booking-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  default:
    name: booking-titanium-network
    driver: bridge
