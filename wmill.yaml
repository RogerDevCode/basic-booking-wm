includes:
  - f/**
excludes:
  - "**/*.d.ts"
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/__init__.py"
  - "**/__pycache__/**"
  - "f/types.ts"
defaultTs: bun
codebases: []
skipVariables: false
skipResources: false
skipResourceTypes: false
skipSecrets: true
skipScripts: false
skipFlows: false
skipApps: false
skipFolders: false
includeSchedules: false
includeTriggers: false
includeUsers: false
includeGroups: false
includeSettings: false
includeKey: false
skipWorkspaceDependencies: false
nonDottedPaths: true
workspaces:
  booking-titanium:
    baseUrl: https://titanium.stax.ink/
    gitBranch: main
    gitSyncInterval: 300
    gitAutoCommit: true
    gitAutoCommitMessage: "chore: auto-commit from Windmill"
