# Windmill override — use external Neon DB, disable extra workers/services, pass env vars
services:
  # Disable bundled Postgres — we use Neon cloud
  db:
    deploy:
      replicas: 0

  # 1 standard TypeScript worker (bun runtime)
  windmill_worker:
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1024M
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ID=${TELEGRAM_ID}
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

  # Disable Go native worker — our project uses TypeScript only
  windmill_worker_native:
    deploy:
      replicas: 0

  # Disable optional services
  windmill_extra:
    image: alpine:latest
    command: ["tail", "-f", "/dev/null"]
    deploy:
      replicas: 0

  windmill_indexer:
    image: alpine:latest
    command: ["tail", "-f", "/dev/null"]
    deploy:
      replicas: 0

  # Pass env vars to server
  windmill_server:
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ID=${TELEGRAM_ID}
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
