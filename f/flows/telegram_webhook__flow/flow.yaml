summary: Telegram Webhook - Single Provider (v9.0)
description: |
  Flow con InlineKeyboardMarkup + editMessageText + FSM wizard.

  CAMBIOS v9.0 (T5):
  - send_telegram_response se ejecuta ANTES de update_conversation_state
  - message_id real de sendMessage se captura del resultado y persiste en Redis
  - edit_message preserva el message_id existente (no sobreescribe con null)
  - Flujo garantiza cero spam: primer mensaje se edita en callbacks subsecuentes

  CAMBIOS v8.0:
  - Soporte callback_query con answerCallbackQuery + editMessageText
  - Router recibe callback_query_id y message_id del estado
  - Wizard genera inline keyboards con callback_data
  - editMessageText reemplaza el mensaje original (cero spam)
  - answerCallbackQuery quita el "cargando" del botón

  Flujo callback_query:
  1. Webhook recibe callback_query
  2. Obtener estado de Redis (booking_state, message_id)
  3. Router: callback_data wizard pattern → FSM dispatch
  4. answerCallbackQuery (quita cargando)
  5. editMessageText (actualiza mensaje con nuevo texto + teclado)
  6. Actualizar estado en Redis

  Flujo mensaje de texto:
  1. Webhook recibe message
  2. Obtener estado de Redis
  3. Router: ¿comando/menú? → directo. ¿Estado activo? → wizard. → AI Agent
  4. Actualizar estado en Redis
  5. Enviar respuesta
value:
  modules:
    - id: webhook_trigger
      summary: Telegram Webhook Trigger
      value:
        type: rawscript
        content: '!inline telegram_webhook_trigger.ts'
        input_transforms:
          event:
            type: javascript
            expr: flow_input
        lock: '!inline telegram_webhook_trigger.lock'
        language: bun
    - id: get_conversation_state
      summary: Obtener estado conversacional de Redis
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
        path: f/internal/conversation_get/main
    - id: telegram_router
      summary: Router con InlineKeyboard + FSM wizard
      value:
        type: script
        input_transforms:
          booking_draft:
            type: javascript
            expr: results.get_conversation_state.data?.booking_draft || null
          booking_state:
            type: javascript
            expr: results.get_conversation_state.data?.booking_state || null
          callback_data:
            type: javascript
            expr: results.webhook_trigger.callback_data
          callback_query_id:
            type: javascript
            expr: results.webhook_trigger.callback_query_id
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          message_id:
            type: javascript
            expr: results.get_conversation_state.data?.message_id ||
              results.webhook_trigger.callback_message_id || null
          text:
            type: javascript
            expr: results.webhook_trigger.text
          username:
            type: javascript
            expr: results.webhook_trigger.username
        path: f/internal/telegram_router/main
    - id: answer_callback
      summary: AnswerCallbackQuery — quita el "cargando" del botón
      value:
        type: script
        input_transforms:
          callback_alert:
            type: javascript
            expr: "''"
          callback_query_id:
            type: javascript
            expr: results.webhook_trigger.callback_query_id || ''
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          mode:
            type: javascript
            expr: "'answer_callback'"
          text:
            type: javascript
            expr: "''"
        path: f/telegram_send/main
      skip_if:
        expr: >
          results.webhook_trigger.callback_query_id === null ||
          results.webhook_trigger.callback_query_id === undefined
    - id: send_telegram_response
      summary: Enviar respuesta (sendMessage o editMessageText)
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          inline_buttons:
            type: javascript
            expr: >
              const router = results.telegram_router.data; if (router &&
              router.inline_keyboard && router.inline_keyboard.length > 0) {
                return router.inline_keyboard.flat();
              } return [];
          message_id:
            type: javascript
            expr: >
              const router = results.telegram_router.data; if (router &&
              router.should_edit) {
                return (
                  router.message_id ||
                  results.get_conversation_state.data?.message_id ||
                  results.webhook_trigger.callback_message_id ||
                  null
                );
              } return null;
          mode:
            type: javascript
            expr: >
              const router = results.telegram_router.data; if (router &&
              router.should_edit && router.message_id) {
                return 'edit_message';
              } else {
                return 'send_message';
              }
          parse_mode:
            type: javascript
            expr: "'Markdown'"
          text:
            type: javascript
            expr: >
              const router = results.telegram_router.data; if (router &&
              router.response_text && router.response_text.length > 0) {
                return router.response_text;
              } const orch = results.execute_action?.data; if (orch) {
                if (orch.message) {
                  return orch.message + (orch.follow_up ? `\n\n${orch.follow_up}` : '');
                }
              } return results.ai_agent?.data?.ai_response || 'Procesado';
        path: f/telegram_send/main
    - id: gate_skip_if_router_handled
      summary: Gate — si el router manejó, saltar AI Agent y orchestrator
      value:
        type: rawscript
        content: '!inline gate_—_si_el_router_manejó,_saltar_ai_agent_y_orchestrator.ts'
        input_transforms: {}
        lock: '!inline gate_—_si_el_router_manejó,_saltar_ai_agent_y_orchestrator.lock'
        language: bun
      skip_if:
        expr: |
          !results.telegram_router.data?.forward_to_ai
    - id: parse_message
      summary: Parsear mensaje
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          text:
            type: javascript
            expr: results.webhook_trigger.text
        path: f/internal/message_parser/main
    - id: gate_parser_error
      summary: Check parser error
      value:
        type: rawscript
        content: '!inline check_parser_error.ts'
        input_transforms: {}
        lock: '!inline check_parser_error.lock'
        language: bun
      skip_if:
        expr: |
          !results.parse_message.success
    - id: ai_agent
      summary: AI Agent con contexto conversacional
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.parse_message.data.chat_id
          conversation_state:
            type: javascript
            expr: results.get_conversation_state.data || null
          text:
            type: javascript
            expr: results.parse_message.data.text
        path: f/internal/ai_agent/main
    - id: gate_execute_action
      summary: Gate — solo ejecuta orchestrator si vino del AI Agent
      value:
        type: rawscript
        content: '!inline gate_—_solo_ejecuta_orchestrator_si_vino_del_ai_agent.ts'
        input_transforms: {}
        lock: '!inline gate_—_solo_ejecuta_orchestrator_si_vino_del_ai_agent.lock'
        language: bun
      skip_if:
        expr: |
          results.telegram_router.data?.forward_to_ai !== true
    - id: execute_action
      summary: Ejecutar acción de booking (via orchestrator flow)
      value:
        type: flow
        input_transforms:
          entities:
            type: javascript
            expr: results.ai_agent.data?.entities || {}
          intent:
            type: javascript
            expr: results.ai_agent.data?.intent || 'duda_general'
          telegram_chat_id:
            type: javascript
            expr: results.parse_message.data.chat_id
          telegram_name:
            type: javascript
            expr: results.webhook_trigger.username
        path: f/flows/booking_orchestrator
    - id: update_conversation_state
      summary: Actualizar estado conversacional en Redis (soporta hand-off de AI a
        wizard)
      value:
        type: script
        input_transforms:
          booking_draft:
            type: javascript
            expr: >
              results.telegram_router.data?.nextDraft ||
              results.execute_action.data?.nextDraft || null
          booking_state:
            type: javascript
            expr: >
              results.telegram_router.data?.nextState ||
              results.execute_action.data?.nextState || null
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          entities:
            type: javascript
            expr: results.ai_agent.data?.entities || {}
          flow_step:
            type: javascript
            expr: results.telegram_router.data?.nextFlowStep || 0
          intent:
            type: javascript
            expr: results.telegram_router.data?.route || results.ai_agent.data?.intent ||
              'desconocido'
          message_id:
            type: javascript
            expr: >
              const newMsgId = results.send_telegram_response.data?.message_id;
              if (typeof newMsgId === 'number') {
                return newMsgId;
              } return results.get_conversation_state.data?.message_id || null;
        path: f/internal/conversation_update/main
schema:
  type: object
  properties:
    webhook_payload:
      type: object
      description: Payload del webhook de Telegram
      properties:
        message:
          type: object
          properties:
            chat:
              type: object
            from:
              type: object
            text:
              type: string
