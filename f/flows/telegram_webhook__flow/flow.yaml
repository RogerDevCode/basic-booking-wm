summary: Telegram Webhook - Single Provider (v9.1)
description: |
  Flow corregido: send_telegram_response se ejecuta AL FINAL para capturar respuestas de Router, AI u Orchestrator.
  Se corrigieron los bloques JS con 'return'.
value:
  modules:
    - id: webhook_trigger
      value:
        type: rawscript
        input_transforms:
          event:
            type: javascript
            expr: flow_input.webhook_payload ?? flow_input
        content: '!inline telegram_webhook_trigger.ts'
        lock: '!inline telegram_webhook_trigger.lock'
        language: bun
      summary: Telegram Webhook Trigger
    - id: get_conversation_state
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
        path: f/internal/conversation_get/main
      summary: Obtener estado conversacional de Redis
    - id: telegram_router
      value:
        type: script
        input_transforms:
          text:
            type: javascript
            expr: results.webhook_trigger.text
          username:
            type: javascript
            expr: results.webhook_trigger.username
          booking_state:
            type: javascript
            expr: results.get_conversation_state.data?.booking_state || null
          callback_data:
            type: javascript
            expr: results.webhook_trigger.callback_data
          booking_draft:
            type: javascript
            expr: results.get_conversation_state.data?.booking_draft || null
          callback_query_id:
            type: javascript
            expr: results.webhook_trigger.callback_query_id
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          message_id:
            type: javascript
            expr: >
              return results.get_conversation_state.data?.message_id || 
                     results.webhook_trigger.callback_message_id || 
                     null;
        path: f/internal/telegram_router/main
      summary: Router con InlineKeyboard + FSM wizard
    - id: answer_callback
      value:
        type: script
        input_transforms:
          text:
            type: javascript
            expr: "''"
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          callback_alert:
            type: javascript
            expr: "''"
          callback_query_id:
            type: javascript
            expr: results.webhook_trigger.callback_query_id || ''
          mode:
            type: javascript
            expr: "'answer_callback'"
        path: f/telegram_send/main
      summary: AnswerCallbackQuery — quita el "cargando" del botón
      skip_if:
        expr: >
          results.webhook_trigger.callback_query_id === null || 
          results.webhook_trigger.callback_query_id === undefined
    - id: gate_skip_if_router_handled
      value:
        type: rawscript
        input_transforms: {}
        content: '!inline gate_—_si_el_router_manejó,_saltar_ai_agent_y_orchestrator.ts'
        lock: '!inline gate_—_si_el_router_manejó,_saltar_ai_agent_y_orchestrator.lock'
        language: bun
      summary: Gate — si el router manejó, saltar AI Agent y orchestrator
      skip_if:
        expr: "!results.telegram_router.data?.forward_to_ai"
    - id: parse_message
      value:
        type: script
        input_transforms:
          text:
            type: javascript
            expr: results.webhook_trigger.text
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
        path: f/internal/message_parser/main
      summary: Parsear mensaje
    - id: gate_parser_error
      value:
        type: rawscript
        input_transforms: {}
        content: '!inline check_parser_error.ts'
        lock: '!inline check_parser_error.lock'
        language: bun
      summary: Check parser error
      skip_if:
        expr: "!results.parse_message.success"
    - id: ai_agent
      value:
        type: script
        input_transforms:
          conversation_state:
            type: javascript
            expr: results.get_conversation_state.data || null
          text:
            type: javascript
            expr: results.parse_message.data.text
          chat_id:
            type: javascript
            expr: results.parse_message.data.chat_id
        path: f/internal/ai_agent/main
      summary: AI Agent con contexto conversacional
    - id: gate_execute_action
      value:
        type: rawscript
        input_transforms: {}
        content: '!inline gate_—_solo_ejecuta_orchestrator_si_vino_del_ai_agent.ts'
        lock: '!inline gate_—_solo_ejecuta_orchestrator_si_vino_del_ai_agent.lock'
        language: bun
      summary: Gate — solo ejecuta orchestrator si vino del AI Agent
      skip_if:
        expr: "results.telegram_router.data?.forward_to_ai !== true"
    - id: execute_action
      value:
        type: flow
        input_transforms:
          intent:
            type: javascript
            expr: "results.ai_agent.data?.intent || 'duda_general'"
          telegram_chat_id:
            type: javascript
            expr: results.parse_message.data.chat_id
          telegram_name:
            type: javascript
            expr: results.webhook_trigger.username
          entities:
            type: javascript
            expr: "results.ai_agent.data?.entities || {}"
        path: f/flows/booking_orchestrator
      summary: Ejecutar acción de booking (via orchestrator flow)
    - id: send_telegram_response
      value:
        type: script
        input_transforms:
          message_id:
            type: javascript
            expr: |
              const router = results.telegram_router.data;
              if (router && router.should_edit) {
                return (
                  router.message_id ||
                  results.get_conversation_state.data?.message_id ||
                  results.webhook_trigger.callback_message_id ||
                  null
                );
              }
              return null;
          mode:
            type: javascript
            expr: |
              const router = results.telegram_router.data;
              if (router && router.should_edit && router.message_id) {
                return 'edit_message';
              }
              return 'send_message';
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          parse_mode:
            type: javascript
            expr: "'Markdown'"
          text:
            type: javascript
            expr: |
              const router = results.telegram_router.data;
              if (router && router.response_text && router.response_text.length > 0) {
                return router.response_text;
              }
              const orch = results.execute_action?.data;
              if (orch) {
                if (orch.message) {
                  return orch.message + (orch.follow_up ? `\n\n${orch.follow_up}` : '');
                }
              }
              return results.ai_agent?.data?.ai_response || 'Lo siento, no pude procesar tu mensaje.';
          inline_buttons:
            type: javascript
            expr: |
              const router = results.telegram_router.data;
              if (router && router.inline_keyboard && router.inline_keyboard.length > 0) {
                return router.inline_keyboard.flat();
              }
              return [];
        path: f/telegram_send/main
      summary: Enviar respuesta (sendMessage o editMessageText)
    - id: update_conversation_state
      value:
        type: script
        input_transforms:
          entities:
            type: javascript
            expr: results.ai_agent.data?.entities || {}
          booking_draft:
            type: javascript
            expr: >
              return results.telegram_router.data?.nextDraft || 
                     results.execute_action.data?.nextDraft || 
                     null;
          flow_step:
            type: javascript
            expr: results.telegram_router.data?.nextFlowStep || 0
          booking_state:
            type: javascript
            expr: >
              return results.telegram_router.data?.nextState || 
                     results.execute_action.data?.nextState || 
                     null;
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          intent:
            type: javascript
            expr: >
              return results.telegram_router.data?.route || 
                     results.ai_agent.data?.intent || 
                     'desconocido';
          message_id:
            type: javascript
            expr: |
              const newMsgId = results.send_telegram_response.data?.message_id;
              if (typeof newMsgId === 'number') {
                return newMsgId;
              }
              return results.get_conversation_state.data?.message_id || null;
        path: f/internal/conversation_update/main
      summary: Actualizar estado conversacional en Redis (soporta hand-off de AI a wizard)
schema:
  type: object
  properties:
    webhook_payload:
      type: object
      description: Payload del webhook de Telegram
      properties:
        message:
          type: object
          properties:
            chat:
              type: object
            from:
              type: object
            text:
              type: string