summary: Telegram Webhook - FULL STACK (Python §PY 2025)
value:
  modules:
    - id: gateway
      summary: Step 1 Gateway
      value:
        type: script
        input_transforms:
          webhook_payload:
            type: javascript
            expr: flow_input.webhook_payload ?? flow_input
        path: f/telegram_gateway/main

    - id: telegram_menu
      summary: Step 2 Menu Router
      value:
        type: script
        input_transforms:
          action:
            type: javascript
            expr: "(results.gateway.text === '/start' || results.gateway.text === '/menu') ? 'start' : (results.gateway.callback_data ? 'select_option' : 'show')"
          chat_id:
            type: javascript
            expr: results.gateway.chat_id
          user_input:
            type: javascript
            expr: results.gateway.callback_data || results.gateway.text
        path: f/telegram_menu/main

    - id: ai_agent
      summary: Step 3 NLU Pipeline
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.gateway.chat_id
          text:
            type: javascript
            expr: results.gateway.text
        path: f/internal/ai_agent/main
      skip_if:
        expr: results.telegram_menu.handled === true

    - id: orchestrator
      summary: Step 4 Booking Orchestrator
      value:
        type: script
        input_transforms:
          entities:
            type: javascript
            expr: "results.ai_agent ? results.ai_agent.entities || {} : {}"
          intent:
            type: javascript
            expr: "(results.gateway.callback_data === 'cmd:book') ? 'crear_cita' : ((results.gateway.callback_data === 'cmd:mybookings') ? 'mis_citas' : (results.ai_agent ? (results.ai_agent.intent || 'duda_general') : 'duda_general'))"
          telegram_chat_id:
            type: javascript
            expr: results.gateway.chat_id
        path: f/booking_orchestrator/main
      skip_if:
        expr: "results.telegram_menu.handled ? true : ((results.gateway.callback_data || '').startsWith('cmd:') ? false : (results.ai_agent && results.ai_agent.intent === 'duda_general'))"

    - id: send_response
      summary: Step 5 Send Telegram
      value:
        type: script
        input_transforms:
          bot_token:
            type: javascript
            expr: variable("u/admin/TELEGRAM_BOT_TOKEN")
          chat_id:
            type: javascript
            expr: results.gateway.chat_id
          mode:
            type: static
            value: send_message
          text:
            type: javascript
            expr: "results.telegram_menu.handled ? results.telegram_menu.response_text : ((results.orchestrator && !results.orchestrator.skip) ? results.orchestrator.message : (results.ai_agent ? results.ai_agent.ai_response : 'Lo siento, error de orquestación.'))"
          inline_buttons_json:
            type: javascript
            expr: "JSON.stringify(results.telegram_menu.handled ? (results.telegram_menu.inline_buttons || []) : ((results.orchestrator && results.orchestrator.inline_buttons) ? results.orchestrator.inline_buttons : []))"
        path: f/telegram_send/main
