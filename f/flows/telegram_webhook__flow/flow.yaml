summary: Telegram Webhook - Phase 3 (Normalize + Classify)
description: >
  Fase 3 de la reconstrucción incremental.

  normalize → classify como pipeline de procesamiento de entrada.
  classify expone should_process, text_kind y canonical_text para el router.
value:
  modules:
    - id: webhook_trigger
      summary: Telegram Webhook Trigger
      value:
        type: rawscript
        content: '!inline telegram_webhook_trigger.py'
        input_transforms:
          webhook_payload:
            type: javascript
            expr: flow_input
        lock: '!inline telegram_webhook_trigger.lock'
        language: python3
    - id: get_conversation_state
      summary: Obtener estado conversacional de Redis
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          redis_url:
            type: javascript
            expr: variable("u/admin/REDIS_URL")
        path: f/internal/conversation_get/main
      skip_if:
        expr: '!results.webhook_trigger.chat_id'
    - id: normalize
      summary: Normalizar input Telegram
      value:
        type: script
        input_transforms:
          input_data:
            type: javascript
            expr: >-
              { "chat_id": results.webhook_trigger.chat_id, "text":
              results.webhook_trigger.text, "username":
              results.webhook_trigger.username, "callback_data":
              results.webhook_trigger.callback_data, "callback_query_id":
              results.webhook_trigger.callback_query_id, "callback_message_id":
              results.webhook_trigger.callback_message_id }
        path: f/internal/telegram_normalize/main
      skip_if:
        expr: '!results.webhook_trigger.chat_id'
    - id: classify
      summary: Clasificar input normalizado
      value:
        type: script
        input_transforms:
          input_data:
            type: javascript
            expr: results.normalize
        path: f/internal/telegram_classify/main
      skip_if:
        expr: '!results.normalize.chat_id'
    - id: update_conversation_state
      summary: Guardar clasificación en Redis
      value:
        type: script
        input_transforms:
          args:
            type: javascript
            expr: >-
              { "chat_id": results.classify.chat_id, "pending_data":
              { "should_process": results.classify.should_process,
              "text_kind": results.classify.text_kind } }
          redis_url:
            type: javascript
            expr: variable("u/admin/REDIS_URL")
        path: f/internal/conversation_update/main
      skip_if:
        expr: '!results.classify.chat_id'
    - id: send_telegram_response
      summary: Enviar respuesta a Telegram
      value:
        type: script
        input_transforms:
          bot_token:
            type: javascript
            expr: variable("u/admin/TELEGRAM_BOT_TOKEN")
          chat_id:
            type: javascript
            expr: results.classify.chat_id
          mode:
            type: static
            value: send_message
          text:
            type: javascript
            expr: >-
              results.classify.should_process
              ? ("[" + results.classify.text_kind + "] " +
              results.classify.canonical_text)
              : ("No procesable [" + results.classify.text_kind + "]")
        path: f/telegram_send/main
      skip_if:
        expr: '!results.classify.chat_id'
