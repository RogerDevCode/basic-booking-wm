summary: Telegram Webhook - Single Provider (v7.0)
description: |
  Flow con FSM wizard + estado conversacional Redis + router determinista.
  
  CAMBIOS v7.0:
  - El router recibe el estado de booking desde Redis (booking_state, booking_draft)
  - Si hay estado activo → delega al FSM wizard (specialty→doctor→time→confirm)
  - El flow_step del router se pasa a update_conversation_state
  - Respuesta determinista del wizard, sin LLM
  - Callbacks y menús se resuelven sin LLM (0ms)

  Flujo:
  1. Webhook recibe mensaje
  2. Obtener estado de Redis (booking_state, booking_draft)
  3. Router: ¿callback/comando/menú? → directo. ¿Estado activo? → FSM wizard. → AI Agent
  4. Actualizar estado en Redis con flow_step del router
  5. Ejecutar booking si viene del AI Agent
  6. Enviar respuesta
value:
  modules:
    - id: webhook_trigger
      value:
        lock: "!inline telegram_webhook_trigger.lock"
        type: rawscript
        content: "!inline telegram_webhook_trigger.ts"
        language: bun
        input_transforms:
          event:
            expr: flow_input
            type: javascript
      summary: Telegram Webhook Trigger
    - id: get_conversation_state
      value:
        path: f/internal/conversation_get
        type: script
        input_transforms:
          chat_id:
            expr: results.webhook_trigger.chat_id
            type: javascript
      summary: Obtener estado conversacional de Redis
    - id: telegram_router
      value:
        path: f/internal/telegram_router
        type: script
        input_transforms:
          text:
            expr: results.webhook_trigger.text
            type: javascript
          chat_id:
            expr: results.webhook_trigger.chat_id
            type: javascript
          callback_data:
            expr: results.webhook_trigger.callback_data
            type: javascript
          username:
            expr: results.webhook_trigger.username
            type: javascript
          booking_state:
            expr: results.get_conversation_state.data?.state || null
            type: javascript
          booking_draft:
            expr: null
            type: javascript
      summary: Router determinista + FSM wizard
    - id: update_conversation_state
      value:
        path: f/internal/conversation_update
        type: script
        input_transforms:
          chat_id:
            expr: results.webhook_trigger.chat_id
            type: javascript
          intent:
            expr: results.telegram_router.data?.route || 'desconocido'
            type: javascript
          entities:
            expr: '{}'
            type: javascript
          flow_step:
            expr: results.telegram_router.data?.nextFlowStep || 0
            type: javascript
      summary: Actualizar estado conversacional en Redis
    - id: gate_skip_if_router_handled
      value:
        lock: "!inline skip_if_router_matched.lock"
        type: rawscript
        content: "!inline skip_if_router_matched.ts"
        language: bun
        input_transforms: {}
      skip_if:
        expr: |
          !results.telegram_router.data?.forward_to_ai
      summary: Gate — si el router manejó, saltar AI Agent y orchestrator
    - id: parse_message
      value:
        path: f/internal/message_parser
        type: script
        input_transforms:
          text:
            expr: results.webhook_trigger.text
            type: javascript
          chat_id:
            expr: results.webhook_trigger.chat_id
            type: javascript
      summary: Parsear mensaje
    - id: gate_parser_error
      value:
        lock: "!inline check_parser_error.lock"
        type: rawscript
        content: "!inline check_parser_error.ts"
        language: bun
        input_transforms: {}
      skip_if:
        expr: |
          !results.parse_message.success
      summary: Check parser error
    - id: ai_agent
      value:
        path: f/internal/ai_agent
        type: script
        input_transforms:
          text:
            expr: results.parse_message.data.text
            type: javascript
          chat_id:
            expr: results.parse_message.data.chat_id
            type: javascript
          conversation_state:
            expr: results.get_conversation_state.data?.state || null
            type: javascript
      summary: AI Agent con contexto conversacional
    - id: gate_execute_action
      value:
        lock: "!inline skip_if_router_handled.lock"
        type: rawscript
        content: "!inline skip_if_router_handled.ts"
        language: bun
        input_transforms: {}
      skip_if:
        expr: |
          results.telegram_router.data?.forward_to_ai !== true
      summary: Gate — solo ejecuta orchestrator si vino del AI Agent
    - id: execute_action
      value:
        path: f/flows/booking_orchestrator__flow
        type: script
        input_transforms:
          chat_id:
            expr: results.parse_message.data.chat_id
            type: javascript
          user_name:
            expr: results.webhook_trigger.username
            type: javascript
          service_id:
            type: static
            value: 1
          start_time:
            expr: |
              const entities = results.ai_agent.data?.entities || {};
              return entities.start_time || '';
            type: javascript
          user_email:
            expr: |
              const entities = results.ai_agent.data?.entities || {};
              return entities.email || ''
            type: javascript
          provider_id:
            type: static
            value: 1
      summary: Ejecutar acción de booking
    - id: send_telegram_response
      value:
        path: f/telegram_send
        type: script
        input_transforms:
          text:
            expr: >
              const router = results.telegram_router.data;
              if (router && router.response_text && router.response_text.length > 0) {
                return router.response_text;
              }
              const booking = results.execute_action.data;
              if (booking?.id) {
                return `✅ *Reserva Confirmada*\n\nID: \`${booking.id}\`\nFecha: ${booking.start_time}`;
              }
              return results.ai_agent.data?.ai_response || 'Procesado';
            type: javascript
          chat_id:
            expr: results.webhook_trigger.chat_id
            type: javascript
      summary: Enviar respuesta por Telegram
schema:
  type: object
  properties:
    webhook_payload:
      type: object
      description: Payload del webhook de Telegram
      properties:
        message:
          type: object
          properties:
            chat:
              type: object
            text:
              type: string
            from:
              type: object
