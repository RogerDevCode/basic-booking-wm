summary: Telegram Webhook - ECO MODE + REDIS (Phase 2 Reconstruction)
description: >
  Fase 2 de la reconstrucción incremental. 

  Añade nodos para obtener y actualizar el estado en Redis, implementando un
  contador simple.
value:
  modules:
    - id: webhook_trigger
      summary: Telegram Webhook Trigger
      value:
        type: rawscript
        content: '!inline telegram_webhook_trigger.py'
        input_transforms:
          webhook_payload:
            type: javascript
            expr: flow_input
        lock: '!inline telegram_webhook_trigger.lock'
        language: python3
    - id: get_conversation_state
      summary: Obtener estado conversacional de Redis
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          redis_url:
            type: javascript
            expr: variable("u/admin/REDIS_URL")
        path: f/internal/conversation_get/main
      skip_if:
        expr: '!results.webhook_trigger.chat_id'
    - id: echo_logic
      summary: Lógica de Eco con Contador (Nodo de Validación)
      value:
        type: rawscript
        content: '!inline lógica_de_eco_con_contador_(nodo_de_validación).py'
        input_transforms:
          args:
            type: javascript
            expr: '{ "chat_id": results.webhook_trigger.chat_id, "text":
              results.webhook_trigger.text, "state":
              results.get_conversation_state.data }'
        lock: '!inline lógica_de_eco_con_contador_(nodo_de_validación).lock'
        language: python3
    - id: update_conversation_state
      summary: Guardar nuevo contador en Redis
      value:
        type: script
        input_transforms:
          args:
            type: javascript
            expr: '{ "chat_id": results.echo_logic.chat_id, "pending_data": { "echo_count":
              results.echo_logic.new_count } }'
          redis_url:
            type: javascript
            expr: variable("u/admin/REDIS_URL")
        path: f/internal/conversation_update/main
      skip_if:
        expr: '!results.echo_logic.chat_id'
    - id: send_telegram_response
      summary: Enviar Eco a Telegram
      value:
        type: script
        input_transforms:
          bot_token:
            type: javascript
            expr: variable("u/admin/TELEGRAM_BOT_TOKEN")
          chat_id:
            type: javascript
            expr: results.echo_logic.chat_id
          mode:
            type: static
            value: send_message
          text:
            type: javascript
            expr: results.echo_logic.text
        path: f/telegram_send/main
      skip_if:
        expr: '!results.echo_logic.chat_id'
