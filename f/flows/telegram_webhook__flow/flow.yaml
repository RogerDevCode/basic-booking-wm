summary: Telegram Webhook - Phase 4 (+ AutoRegister user_id)
description: >
  Fase 4: deduplicate → normalize → classify → auto_register → prefetch → router FSM.
  telegram_auto_register resuelve chat_id → user_id (UPSERT en users).
  user_id queda disponible para booking_create en la siguiente fase.
value:
  modules:
    - id: webhook_trigger
      summary: Telegram Webhook Trigger
      value:
        type: rawscript
        content: '!inline telegram_webhook_trigger.py'
        input_transforms:
          webhook_payload:
            type: javascript
            expr: flow_input
        lock: '!inline telegram_webhook_trigger.lock'
        language: python3
    - id: telegram_deduplicate
      summary: Deduplicar webhook por update_id
      value:
        type: script
        input_transforms:
          update_id:
            type: javascript
            expr: results.webhook_trigger.update_id
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          redis_url:
            type: javascript
            expr: variable("u/admin/REDIS_URL")
        path: f/internal/telegram_deduplicate/main
      skip_if:
        expr: '!results.webhook_trigger.chat_id'
    - id: get_conversation_state
      summary: Obtener estado conversacional de Redis
      value:
        type: script
        input_transforms:
          chat_id:
            type: javascript
            expr: results.webhook_trigger.chat_id
          redis_url:
            type: javascript
            expr: variable("u/admin/REDIS_URL")
        path: f/internal/conversation_get/main
      skip_if:
        expr: '!results.webhook_trigger.chat_id || results.telegram_deduplicate.duplicate'
    - id: normalize
      summary: Normalizar input Telegram
      value:
        type: script
        input_transforms:
          input_data:
            type: javascript
            expr: >-
              { "chat_id": results.webhook_trigger.chat_id, "text":
              results.webhook_trigger.text, "username":
              results.webhook_trigger.username, "callback_data":
              results.webhook_trigger.callback_data, "callback_query_id":
              results.webhook_trigger.callback_query_id, "callback_message_id":
              results.webhook_trigger.callback_message_id }
        path: f/internal/telegram_normalize/main
      skip_if:
        expr: '!results.webhook_trigger.chat_id || results.telegram_deduplicate.duplicate'
    - id: classify
      summary: Clasificar input normalizado
      value:
        type: script
        input_transforms:
          input_data:
            type: javascript
            expr: results.normalize
        path: f/internal/telegram_classify/main
      skip_if:
        expr: '!results.normalize.chat_id || results.telegram_deduplicate.duplicate'
    - id: telegram_auto_register
      summary: Registrar/resolver usuario Telegram → user_id en DB
      value:
        type: script
        input_transforms:
          args:
            type: javascript
            expr: >-
              { "chat_id": results.webhook_trigger.chat_id,
                "first_name": results.webhook_trigger.first_name,
                "last_name": results.webhook_trigger.last_name || null,
                "username": results.webhook_trigger.username || null }
        path: f/telegram_auto_register/main
      skip_if:
        expr: '!results.classify.chat_id || results.telegram_deduplicate.duplicate'
    - id: booking_prefetch
      summary: Pre-fetch especialidades/doctores segun estado FSM actual
      value:
        type: script
        input_transforms:
          pg_url:
            type: javascript
            expr: variable("u/admin/DATABASE_URL")
          booking_state:
            type: javascript
            expr: results.get_conversation_state.data?.booking_state || null
          booking_draft:
            type: javascript
            expr: results.get_conversation_state.data?.booking_draft || null
          user_input:
            type: javascript
            expr: results.classify.canonical_text || null
        path: f/internal/booking_prefetch/main
      skip_if:
        expr: '!results.classify.chat_id || results.telegram_deduplicate.duplicate'
    - id: router
      summary: Enrutar via FSM de booking
      value:
        type: script
        input_transforms:
          args:
            type: javascript
            expr: >-
              { "chat_id": results.classify.chat_id, "user_input":
              results.classify.canonical_text, "state":
              results.get_conversation_state.data || {}, "items":
              results.booking_prefetch.items || [] }
        path: f/internal/telegram_router/main
      skip_if:
        expr: '!results.classify.chat_id || results.telegram_deduplicate.duplicate'
    - id: update_conversation_state
      summary: Persistir nuevo estado en Redis
      value:
        type: script
        input_transforms:
          args:
            type: javascript
            expr: >-
              { "chat_id": results.classify.chat_id, "booking_state":
              results.router?.data?.nextState, "active_flow":
              results.router?.data?.active_flow || null, "pending_data":
              { "router_handled": results.router?.data?.handled,
              "text_kind": results.classify.text_kind,
              "user_id": results.telegram_auto_register?.user_id || null,
              "client_id": results.telegram_auto_register?.client_id || null } }
          redis_url:
            type: javascript
            expr: variable("u/admin/REDIS_URL")
        path: f/internal/conversation_update/main
      skip_if:
        expr: '!results.classify.chat_id || results.telegram_deduplicate.duplicate'
    - id: booking_commit
      summary: Crear cita real en DB cuando FSM alcanza estado completed
      value:
        type: script
        input_transforms:
          client_id:
            type: javascript
            expr: results.telegram_auto_register.client_id
          provider_id:
            type: javascript
            expr: results.get_conversation_state.data?.booking_state?.doctorId
          start_time:
            type: javascript
            expr: results.get_conversation_state.data?.booking_state?.draft?.start_time
          chat_id:
            type: javascript
            expr: results.classify.chat_id
        path: f/internal/booking_confirm/main
      skip_if:
        expr: >-
          results.router?.data?.nextState?.name !== "completed" ||
          results.telegram_deduplicate.duplicate
    - id: send_telegram_response
      summary: Enviar respuesta a Telegram
      value:
        type: script
        input_transforms:
          bot_token:
            type: javascript
            expr: variable("u/admin/TELEGRAM_BOT_TOKEN")
          chat_id:
            type: javascript
            expr: results.classify.chat_id
          mode:
            type: static
            value: send_message
          text:
            type: javascript
            expr: >-
              (results.booking_commit?.success)
              ? ("✅ *Reserva Confirmada*\n\n" +
                 "📋 " + results.booking_commit.service_name + " con " + results.booking_commit.provider_name + "\n" +
                 "🆔 ID: `" + results.booking_commit.booking_id + "`\n\n" +
                 "Recibirás un recordatorio antes de tu cita.")
              : (results.booking_commit?.error)
              ? ("❌ No se pudo confirmar la cita.\n\n" + results.booking_commit.error + "\n\nIntenta seleccionar otro horario.")
              : (results.router?.data?.handled && results.router?.data?.response_text)
              ? results.router?.data?.response_text
              : ("[no_manejado:" + results.classify.text_kind + "] " +
                 results.classify.canonical_text)
        path: f/telegram_send/main
      skip_if:
        expr: '!results.classify.chat_id || results.telegram_deduplicate.duplicate'
