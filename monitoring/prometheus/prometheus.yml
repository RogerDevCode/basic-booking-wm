global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'booking-health'
    scrape_interval: 30s
    static_configs:
      - targets: ['ai-agent:8080']
    metrics_path: '/health'

  - job_name: 'redis'
    scrape_interval: 15s
    static_configs:
      - targets: ['redis:6379']
