name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.test
        run: |
          cat > .env.test << 'ENVEOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2=${{ secrets.GROQ_API_KEY_2 }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          AI_AGENT_LLM_MODE=test
          GROQ_LLM_TIMEOUT_MS=2000
          ENVEOF

      - name: Run tests
        run: npm test

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --project tsconfig.strict.json

      - name: Lint
        run: npx eslint f/ --ext .ts --max-warnings 0 || true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.ai-agent -t booking-titanium:latest .

      - name: Verify image
        run: docker run --rm booking-titanium:latest node -e "console.log('Container OK')"
