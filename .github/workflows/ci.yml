name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python Type Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy pyright pylint

      - name: Type check (mypy)
        run: mypy f/ --strict 2>/dev/null || echo "mypy checks skipped"

      - name: Type check (pyright)
        run: pyright f/ 2>/dev/null || echo "pyright checks skipped"

  build:
    name: Verify Windmill Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify metadata exists
        run: |
          if [ -f "wmill-lock.yaml" ]; then
            echo "✓ Windmill metadata found"
          else
            echo "⚠ Warning: wmill-lock.yaml not found"
          fi

      - name: Verify Python structure
        run: |
          if [ -d "f/" ]; then
            echo "✓ Windmill modules found"
            find f/ -name "main.py" | head -5
          else
            echo "✗ No f/ directory found"
            exit 1
          fi
