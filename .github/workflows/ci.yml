name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Run Ruff Check
        run: uv run ruff check .

      - name: Run Ruff Format
        run: uv run ruff format --check .

      - name: Run Mypy (Strict)
        run: |
          mkdir -p stubs
          MYPYPATH=./stubs uv run mypy --strict .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Create .env.test
        run: |
          cat > .env.test << 'ENVEOF'
          DATABASE_URL=postgresql://windmill:windmill@localhost:5432/windmill
          REDIS_URL=redis://localhost:6379
          GROQ_API_KEY=dummy
          OPENAI_API_KEY=dummy
          ENVEOF

      - name: Run Tests
        run: uv run pytest --tb=short -q

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.ai-agent -t booking-titanium:latest .
