# Cloudflare Tunnel Overlay — add to docker-compose.windmill.yml for external test access
# Usage: docker-compose -f docker-compose.windmill.yml -f docker-compose.cloudflared.yml up -d
# Requires: .env.cloudflared with CLOUDFLARE_TUNNEL_TOKEN set

version: "3.7"

services:
  # Expose Windmill to internet via Cloudflare Tunnel
  # Token: https://dash.cloudflare.com/profile/api-tokens (create "Cloudflare Tunnel" token)
  cloudflared:
    container_name: windmill-cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    env_file:
      - .env.cloudflared
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      caddy:
        condition: service_started
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
